<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valorant Map Picks and Bans Overlay</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="overlay-page transparent">
  <main class="valorant-veto-overlay" data-valorant-map-veto-overlay aria-live="polite">
    <article class="valorant-card valorant-ban-card" data-veto-card>
      <div class="ban-half ban-top" data-ban-slot="ban1">
        <p class="slot-label">BAN</p>
        <p class="slot-value" data-ban-value="ban1">MAP</p>
      </div>
      <div class="ban-half ban-bottom" data-ban-slot="ban2">
        <p class="slot-label">BAN</p>
        <p class="slot-value" data-ban-value="ban2">MAP</p>
      </div>
      <div class="ban-diagonal" aria-hidden="true"></div>
    </article>

    <article class="valorant-card valorant-pick-card" data-veto-card>
      <div class="pick-team-slot pick-team-slot--defenders">
        <div class="pick-team-logo" data-pick-team-logo="pick1-defenders" aria-label="Defenders team logo"></div>
        <p class="pick-team-label">DEFENDERS</p>
      </div>
      <p class="pick-label">MAP PICK</p>
      <p class="pick-map" data-pick-value="pick1"></p>
      <div class="pick-recap" data-pick-recap="pick1">
        <div class="pick-recap-logo" data-pick-winner-logo="pick1"></div>
        <p class="pick-recap-score" data-pick-scoreline="pick1"></p>
      </div>
      <div class="pick-number">1</div>
      <div class="pick-underline"></div>
      <div class="pick-team-slot pick-team-slot--attackers">
        <p class="pick-team-label">ATTACKERS</p>
        <div class="pick-team-logo" data-pick-team-logo="pick1-attackers" aria-label="Attackers team logo"></div>
      </div>
    </article>

    <article class="valorant-card valorant-pick-card" data-veto-card>
      <div class="pick-team-slot pick-team-slot--defenders">
        <div class="pick-team-logo" data-pick-team-logo="pick2-defenders" aria-label="Defenders team logo"></div>
        <p class="pick-team-label">DEFENDERS</p>
      </div>
      <p class="pick-label">MAP PICK</p>
      <p class="pick-map" data-pick-value="pick2"></p>
      <div class="pick-recap" data-pick-recap="pick2">
        <div class="pick-recap-logo" data-pick-winner-logo="pick2"></div>
        <p class="pick-recap-score" data-pick-scoreline="pick2"></p>
      </div>
      <div class="pick-number">2</div>
      <div class="pick-underline"></div>
      <div class="pick-team-slot pick-team-slot--attackers">
        <p class="pick-team-label">ATTACKERS</p>
        <div class="pick-team-logo" data-pick-team-logo="pick2-attackers" aria-label="Attackers team logo"></div>
      </div>
    </article>

    <article class="valorant-card valorant-ban-card" data-veto-card>
      <div class="ban-half ban-top" data-ban-slot="ban3">
        <p class="slot-label">BAN</p>
        <p class="slot-value" data-ban-value="ban3">MAP</p>
      </div>
      <div class="ban-half ban-bottom" data-ban-slot="ban4">
        <p class="slot-label">BAN</p>
        <p class="slot-value" data-ban-value="ban4">MAP</p>
      </div>
      <div class="ban-diagonal" aria-hidden="true"></div>
    </article>

    <article class="valorant-card valorant-pick-card" data-veto-card>
      <div class="pick-team-slot pick-team-slot--defenders">
        <div class="pick-team-logo" data-pick-team-logo="pick3-defenders" aria-label="Defenders team logo"></div>
        <p class="pick-team-label">DEFENDERS</p>
      </div>
      <p class="pick-label">MAP PICK</p>
      <p class="pick-map" data-pick-value="pick3"></p>
      <div class="pick-recap" data-pick-recap="pick3">
        <div class="pick-recap-logo" data-pick-winner-logo="pick3"></div>
        <p class="pick-recap-score" data-pick-scoreline="pick3"></p>
      </div>
      <div class="pick-number">3</div>
      <div class="pick-underline"></div>
      <div class="pick-team-slot pick-team-slot--attackers">
        <p class="pick-team-label">ATTACKERS</p>
        <div class="pick-team-logo" data-pick-team-logo="pick3-attackers" aria-label="Attackers team logo"></div>
      </div>
    </article>
  </main>

  <script src="./js/heroes-data.js" defer></script>
  <script src="./js/app.js" defer></script>
</body>
</html>
