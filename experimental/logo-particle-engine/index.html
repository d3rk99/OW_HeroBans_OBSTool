<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Logo Particle Engine Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="header">
      <h1>Game Day Stream Opener • Logo Particle Engine</h1>
      <p>
        Drop in any school/team logo PNG and the particles will re-form into that image in real time.
      </p>
    </section>

    <section class="controls" aria-label="Particle engine controls">
      <label class="upload">
        <span>Upload Logo (PNG)</span>
        <input id="logoInput" type="file" accept="image/png,image/*" />
      </label>

      <label>
        <span>Particle Density</span>
        <input id="density" type="range" min="3" max="12" value="6" />
      </label>

      <label>
        <span>Particle Size</span>
        <input id="size" type="range" min="1" max="5" value="2" step="0.5" />
      </label>

      <label>
        <span>Settle Speed</span>
        <input id="speed" type="range" min="0.03" max="0.2" value="0.08" step="0.01" />
      </label>

      <button id="burst" type="button">Burst + Reform</button>
      <button id="reset" type="button">Load Default</button>
    </section>

    <section class="canvas-wrap">
      <canvas id="scene" width="1280" height="720" aria-label="Particle logo animation"></canvas>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
